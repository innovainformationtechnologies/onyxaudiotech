<div class="podcast_container">
    <div class="games_body">
		<iframe id="iframe" src="" width="100%" height="100%"></iframe>
	</div>

    <style>
		.basic_info{
			display: flex;
			flex-direction: row;
			justify-content: space-between;
			align-items: flex-start;
			padding: 1rem;
			&>div{
				flex: 1;
				margin: 0 1rem;
			}
		}
		.controls{
			display: flex;
			flex-direction: row;
			justify-content: flex-start;
			align-items: center;
			gap: 2rem;
		}
		.games_body{
			height: 100%;
			&>iframe{
				width: 50vw;
				height: 60vh;
			}
		}
        .block_image{
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 1rem;
        }
		@media screen and (max-width: 1000px) {
			.games_body{
				&>iframe{
					width: 100%;
					height: 50vh;
				}
			}
		}
    </style>
    <script>
        (function(){
            function init(data){
                const element = document.getElementById(`${data.id}`)
				const iframe = element.querySelector("#iframe")
				iframe.src = data.game_url
            }

            window.componentRegistry.register("games", init)
        })()
    </script>
</div>
