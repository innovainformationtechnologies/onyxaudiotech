<!-------------------------------------
3D Portfolio Card
Author: Innova Information Technologyies
Args: id, model_path, x, y, z, canvas_width, canvas_height, title, description, immersive
--------------------------------------->

<div class="portfolio_card_3d_container">
    <div class="portfolio_card_3d_body">
        <div class="container3D"></div>
        <div class="info">
            <h3 class="text1"></h3>
            <p class="text2"></p>
        </div>
    </div>
    <style>
        .portfolio_card_3d_container{
            width: 50vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .portfolio_card_3d_body{
            width: fit-content;
            height: auto;
            margin: auto;
        }
        .info{
            text-align: center;
            margin: auto;
            &.tool-tip{
                display: none;
                position: absolute;
                opacity: 0;
                background-color: var(--primary_color);
                color: var(--text) !important;
                max-width: 40rem;
                text-align: left;
                padding: 0rem 3rem;
                &>*{
                    font-size: var(--font_size_base) !important;
                    color: var(--text) !important;
                }
                /* max-height: 20rem; */
                transition: all 0.3s ease-in-out;
            }
            &.show{
                opacity: 255;
                display: block !important;
            }
        }
    </style>
    <script src="https://cdn.skypack.dev/three@0.129.0/build/three.module.js" type="module"></script>
    <script src="https://cdn.skypack.dev/three@0.129.0/examples/jsm/controls/OrbitControls.js" type="module"></script>
    <script src="https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/GLTFLoader.js" type="module"></script>
    <script>
        (function(){
             //Keep track of the mouse position, so we can make the eye move
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            async function initThreeJS(container, model_path, x, y, z) {
                if (!window.THREE || !window.OrbitControls || !window.GLTFLoader) {
                    await import("https://cdn.skypack.dev/three@0.129.0/build/three.module.js").then(THREEJS => {
                        window.THREE = THREEJS
                    })
                    await import("https://cdn.skypack.dev/three@0.129.0/examples/jsm/controls/OrbitControls.js").then(Orbit => {
                        window.Orbit = Orbit
                    })
                    await import("https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/GLTFLoader.js").then(GLTF => {
                        window.GLTF = GLTF
                    })
                    
                }
                
                console.log(window.THREE, window.Orbit, window.GLTF)
        
                //Create a Three.JS Scene
                const scene = new THREE.Scene();
                //create a new camera with positions and angles
                const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.01, 1000);
                
                //Keep the 3D object on a global variable so we can access it later
                let objToRender = model_path
                let object;
                
                //OrbitControls allow the camera to move around the scene
                let controls;
                
                
                
                //Instantiate a loader for the .gltf file
                const loader = new window.GLTF.GLTFLoader();
                
                //Load the file
                loader.load(
                model_path,
                function (gltf) {
                    //If the file is loaded, add it to the scene
                    object = gltf.scene;
                    scene.add(object);
                },
                function (xhr) {
                    //While it is loading, log the progress
                    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                function (error) {
                    //If there is an error, log it
                    console.error(error);
                }
            );

                //Instantiate a new renderer and set its size
                const renderer = new window.THREE.WebGLRenderer({ alpha: true, antialias: true}); //Alpha: true allows for the transparent background
                resize();
                
                
                //Add the renderer to the DOM
                container.appendChild(renderer.domElement);
                
                
                //Set how far the camera will be from the 3D model
                camera.position.z = z
                camera.position.y = y
                camera.position.x = x
                
                //Add lights to the scene, so we can actually see the 3D model
                const topLight = new THREE.DirectionalLight(0xffffff, 1); // (color, intensity)
                topLight.position.set(500, 500, 500) //top-left-ish
                topLight.castShadow = true;
                scene.add(topLight);
                
                const ambientLight = new THREE.AmbientLight(0x333333, 1);
                scene.add(ambientLight);
                
                //This adds controls to the camera, so we can rotate / zoom it with the mouse
                if (objToRender) {
                    controls = new window.Orbit.OrbitControls(camera, renderer.domElement);
                }

                //Render the scene
                function animate() {
                    requestAnimationFrame(animate);
                    //Here we could add some code to update the scene, adding some automatic movement
                    
                    //   //Make the model move
                    //   if (object) {
                        //     //I've played with the constants here until it looked good 
                        //     object.rotation.y = -3 + mouseX / window.innerWidth * 3;
                        //     object.rotation.x = -1.2 + mouseY * 2.5 / window.innerHeight;
                        //   }
                        
                        controls.update()
                        renderer.render(scene, camera);
                }
                function resize() {
                    camera.aspect = container.offsetWidth / container.offsetHeight
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.offsetWidth, container.offsetHeight);
                }
                //Add a listener to the window, so we can resize the window and the camera
                window.addEventListener("resize", function () {
                    resize();
                });

                animate()
            }
            

            
            async function init(data){
                document.onmousemove = (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY - 150;
                }
                const element = document.getElementById(`${data.id}`)
                let canvas = element.querySelector(".container3D")
                canvas.style.width = data.canvas_width
                canvas.style.height = data.canvas_height
                // element.querySelector(".text").innerText = data.text
                initThreeJS(canvas, "static/"+data.model_path, data.x, data.y, data.z)
                
                element.querySelector(".text1").innerText = data.title
                element.querySelector(".text2").innerText = data.description
                console.log("immersive portfolio: ", data.immersive == "true")
                if (data.immersive == "true") {
                    element.querySelector(".info").classList.add("tool-tip")
                }

                canvas.onmouseover = (e) => {
                    if (data.immersive) {
                        element.querySelector(".info").classList.add("show")
                        element.querySelector(".info").style.left = `${mouseX}px`
                        element.querySelector(".info").style.top = `${mouseY}px`
                    }
                }

                canvas.onmouseout = () => {
                    if (data.immersive) {
                        element.querySelector(".info").classList.remove("show")
                    }
                }
                
            }
            
            window.componentRegistry.register("portfolio_card_3d", init)
        })()
        </script>
        </div>
