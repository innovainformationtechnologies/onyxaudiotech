<div class="timelapse_container">
    <div class="music_body">
		<iframe id="iframe" src="" width="100%" height="100%"></iframe>
	</div>

    <style>
		.controls{
			display: flex;
			flex-direction: row;
			justify-content: flex-start;
			align-items: center;
			gap: 2rem;
		}
		.music_body{
			height: fit-content;
			width: fit-content;
			&>iframe{
				width: fit-content;
				height: 60vh;
			}
		}

        .block_image{
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 1rem;
        }
    </style>
    <script>
        (function(){

            function init(data){
                const element = document.getElementById(`${data.id}`)
				const iframe = element.querySelector("#iframe")
				iframe.src = data.music_url
            }

            window.componentRegistry.register("music", init)
        })()
    </script>
</div>
